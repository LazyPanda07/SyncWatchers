name: "Continuous Integration"

on:
  push:
    branches: [master, dev, client, server]


jobs:
  windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
  
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
      
    - name: Build
      run: |
          msbuild SyncWatchers.sln /p:Configuration=Release -t:rebuild
          cd Tests
          dotnet publish Tests.sln -o ${{ github.workspace }}/bin/Release-x64/Tests /p:DebugType=None /p:DebugSymbols=false /p:Configuration=Release /p:Platform="Any CPU"

    - name: Tests
      shell: bash
      run: |
          cd bin/Release-x64/SyncWatchers
          ./SyncWatchers.exe & sleep 1
          cd ../Tests
          dotnet test Tests.dll

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: build/bin


  linux:
    runs-on: ubuntu-latest
    container:
      image: lazypanda07/web_framework_dev:1.0.7

    steps:
    - uses: actions/checkout@v4
  
    - name: Build
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON .. && make install -j $(nproc)

    - name: Tests
      run: |
          cd build/bin
          export LD_LIBRARY_PATH=$(pwd):${LD_LIBRARY_PATH}
          ./SyncWatchers & sleep 1
          cd ../Tests
          dotnet test Tests.dll

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: build/bin
        