name: "Continuous Integration"

on:
  push:
    branches: [master, dev, server]


jobs:
  windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
  
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Enable NMake
      uses: ilammy/msvc-dev-cmd@v1.13.0
      
    - name: Build
      shell: bash
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=bin .. && cmake --build . --parallel $(nproc) --config Release --target install

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows
        path: build/bin


  linux:
    runs-on: ubuntu-latest
    container:
      image: lazypanda07/web_framework_dev:1.0.3

    steps:
    - uses: actions/checkout@v4
  
    - name: Build
      run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=bin .. && make install -j $(nproc)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux
        path: build/bin

  
  linux-test:
    runs-on: ubuntu-latest
    needs: linux
    container:
      image: lazypanda07/web_framework_dev:1.0.3

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: linux
        path: Tests/binaries

    - name: Run tests
      working-directory: Tests/scripts
      shell: bash
      run: source run_tests.sh
